name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without the v prefix (e.g. 1.2.3)'
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  # Normalize to "release-v<semver>" for both trigger paths so a dispatch and a
  # tag-push for the same version cancel/serialize each other rather than running
  # in parallel.  For workflow_dispatch the input is bare semver (1.2.3); for a
  # tag push github.ref_name is already "v1.2.3".
  group: release-${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
  cancel-in-progress: true

jobs:
  verify-tag:
    name: Verify release tag and readiness
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      actions: read

    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      ready: ${{ steps.tag.outputs.ready }}

    steps:
      - name: Resolve tag and verify CI readiness
        id: tag
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Determine tag name from the trigger source.
            let tagName;
            if (context.eventName === 'workflow_dispatch') {
              const version = context.payload.inputs.version;
              if (!version || !/^\d+\.\d+\.\d+(-[a-zA-Z0-9.-]+)?$/.test(version)) {
                core.setFailed(`Invalid version input: '${version}'. Expected semver, e.g. 1.2.3`);
                return;
              }
              tagName = `v${version}`;
            } else {
              tagName = context.ref.replace('refs/tags/', '');
              if (!tagName || !tagName.startsWith('v')) {
                core.info(`Ref '${context.ref}' is not a release tag; skipping.`);
                core.setOutput('release_tag', '');
                core.setOutput('ready', 'false');
                return;
              }
            }

            // For workflow_dispatch: create the annotated tag via the API so that the
            // GITHUB_TOKEN actor (GitHub Actions) performs the creation.  This bypasses
            // repository rulesets that restrict who can push tag refs directly.
            if (context.eventName === 'workflow_dispatch') {
              // Resolve latest main SHA at tag-creation time.
              const mainForTag = await github.rest.repos.getBranch({ owner, repo, branch: 'main' });
              const mainShaForTag = mainForTag.data.commit.sha;

              let tagExists = false;
              try {
                await github.rest.git.getRef({ owner, repo, ref: `tags/${tagName}` });
                tagExists = true;
              } catch (e) {
                if (e.status !== 404) throw e;
              }
              if (tagExists) {
                core.setFailed(`Tag ${tagName} already exists. Delete it before re-running.`);
                return;
              }

              core.info(`Creating tag ${tagName} at ${mainShaForTag}...`);
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tagName}`,
                sha: mainShaForTag,
              });
              core.info(`Tag ${tagName} created.`);
            }

            // Re-fetch main right before the tag-vs-main comparison so the check
            // reflects "latest main at verification time" rather than a snapshot
            // taken earlier in the step.
            const mainBranch = await github.rest.repos.getBranch({ owner, repo, branch: 'main' });
            const mainSha = mainBranch.data.commit.sha;

            const refData = await github.rest.git.getRef({
              owner,
              repo,
              ref: `tags/${tagName}`,
            });

            const refObj = refData.data.object;
            const taggedSha =
              refObj.type === 'tag'
                ? (await github.rest.git.getTag({ owner, repo, tag_sha: refObj.sha })).data.object.sha
                : refObj.sha;

            if (taggedSha !== mainSha) {
              core.setFailed(
                `Release blocked: tag ${tagName} points to ${taggedSha}, but latest main is ${mainSha}.`
              );
              return;
            }

            const requiredWorkflows = ['CI'];

            for (const workflowName of requiredWorkflows) {
              const workflowsResp = await github.rest.actions.listRepoWorkflows({
                owner,
                repo,
                per_page: 100,
              });

              const workflow = workflowsResp.data.workflows.find(w => w.name === workflowName);
              if (!workflow) {
                core.setFailed(`Release blocked: required workflow '${workflowName}' not found.`);
                return;
              }

              const runsResp = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflow.id,
                branch: 'main',
                head_sha: mainSha,
                status: 'completed',
                per_page: 10,
              });

              const run = runsResp.data.workflow_runs[0];
              if (!run) {
                core.setFailed(
                  `Release blocked: required workflow '${workflowName}' has no completed run for ${mainSha}.`
                );
                return;
              }
              if (run.conclusion !== 'success') {
                core.setFailed(
                  `Release blocked: workflow '${workflowName}' concluded with '${run.conclusion}' on ${mainSha}.`
                );
                return;
              }
            }

            core.info(`Release tag: ${tagName} on latest main ${mainSha}; all checks passed.`);
            core.setOutput('release_tag', tagName);
            core.setOutput('ready', 'true');

  release:
    name: Build GitHub Release
    needs: verify-tag
    if: needs.verify-tag.outputs.release_tag != '' && needs.verify-tag.outputs.ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.verify-tag.outputs.release_tag }}
          fetch-depth: 0

      - name: Generate release notes
        id: changelog_notes
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentTag = '${{ needs.verify-tag.outputs.release_tag }}';

            const tagsResp = await github.rest.repos.listTags({ owner, repo, per_page: 100 });
            const index = tagsResp.data.findIndex(t => t.name === currentTag);
            const previousTag =
              index >= 0
                ? (tagsResp.data.slice(index + 1).find(t => t.name.startsWith('v'))?.name ?? '')
                : '';

            const notesResponse = await github.rest.repos.generateReleaseNotes({
              owner,
              repo,
              tag_name: currentTag,
              ...(previousTag ? { previous_tag_name: previousTag } : {}),
              target_commitish: 'main',
            });

            core.setOutput('previous_tag', previousTag);
            core.setOutput('notes', notesResponse.data.body ?? '');

      - name: Write release notes to file
        run: printf '%s' "$RELEASE_NOTES" > release-notes.md
        env:
          RELEASE_NOTES: ${{ steps.changelog_notes.outputs.notes }}

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Setup Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: 24

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Assert tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          pkg_version="v$(node -p "require('./package.json').version")"
          tag="${{ needs.verify-tag.outputs.release_tag }}"
          if [[ "$tag" != "$pkg_version" ]]; then
            echo "Release blocked: tag '$tag' does not match package version '$pkg_version'." >&2
            exit 1
          fi

      - name: Build package
        run: pnpm run build

      - name: Pack npm tarball
        run: npm pack ./dist --pack-destination .

      - name: Verify npm tarball contents
        shell: bash
        run: |
          set -euo pipefail

          tarball="$(find . -maxdepth 1 -name '*.tgz' -print -quit)"
          if [[ -z "$tarball" ]]; then
            echo 'Release blocked: npm pack did not produce a tarball.' >&2
            exit 1
          fi

          manifest="$(tar -tzf "$tarball")"
          printf '%s\n' "$manifest" | grep -q '^package/package.json$'
          printf '%s\n' "$manifest" | grep -q '^package/index.js$'
          printf '%s\n' "$manifest" | grep -q '^package/index.d.ts$'
          printf '%s\n' "$manifest" | grep -q '^package/inspector/index.js$'
          printf '%s\n' "$manifest" | grep -q '^package/persistence/plugin.svelte.js$'
          if printf '%s\n' "$manifest" | grep -q '\.spec\.'; then
            echo 'Release blocked: tarball contains .spec. files.' >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ needs.verify-tag.outputs.release_tag }}
          body_path: release-notes.md
          files: '*.tgz'
          draft: false
          prerelease: ${{ contains(needs.verify-tag.outputs.release_tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
